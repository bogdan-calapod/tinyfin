<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable icon with safe zone padding (inner 80%) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="50%" style="stop-color:#FF8E53"/>
      <stop offset="100%" style="stop-color:#FFD93D"/>
    </linearGradient>
  </defs>
  <!-- Full background for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Play button in safe zone (centered, ~60% of size) -->
  <polygon points="190,170 190,342 350,256" fill="white"/>
</svg>
