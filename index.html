<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FF6B9D">
    <title>TinyFin</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
</head>
<body>
    <!-- Setup Screen -->
    <div id="setup-screen" class="screen">
        <div class="setup-container">
            <div class="setup-logo">
                <svg viewBox="0 0 100 100" class="logo-icon">
                    <circle cx="50" cy="50" r="45" fill="#FF6B9D"/>
                    <polygon points="40,30 40,70 75,50" fill="white"/>
                </svg>
            </div>
            <div class="setup-form">
                <input type="url" id="server-url" placeholder="Jellyfin Server URL" autocomplete="url">
                <input type="text" id="username" placeholder="Username" autocomplete="username">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
                <button id="connect-btn" class="connect-button">
                    <svg viewBox="0 0 24 24" width="48" height="48">
                        <circle cx="12" cy="12" r="10" fill="#4CAF50"/>
                        <path d="M8 12l3 3 5-6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div id="setup-error" class="error-message"></div>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen hidden">
        <!-- Offline Indicator -->
        <div id="offline-indicator" class="offline-indicator hidden">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M24 8.98C20.93 5.9 16.69 4 12 4c-.32 0-.65.02-.97.05L3.71 2.1 2.29 3.52l18.19 18.19 1.41-1.42-3.01-3.01C21.17 15.29 24 12.37 24 8.98zM12 6c4.14 0 7.89 1.68 10.6 4.39l-1.41 1.41C19.09 9.71 15.73 8 12 8c-.94 0-1.86.1-2.75.28l-1.6-1.6C8.97 6.25 10.46 6 12 6z" fill="white"/>
                <circle cx="12" cy="18" r="2" fill="white"/>
            </svg>
        </div>
        <!-- Navigation Bar -->
        <nav class="nav-bar">
            <button class="nav-btn active" data-filter="videos" aria-label="Videos">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="#FF9800"/>
                    <polygon points="10,8 10,16 16,12" fill="white"/>
                </svg>
            </button>
            <button class="nav-btn" data-filter="shows" aria-label="TV Shows">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="#9C27B0"/>
                    <rect x="5" y="7" width="14" height="10" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
                    <line x1="10" y1="5" x2="12" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="14" y1="5" x2="12" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                    <rect x="10" y="17" width="4" height="2" rx="0.5" fill="white"/>
                </svg>
            </button>
            <button class="nav-btn" data-filter="movies" aria-label="Movies">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="#2196F3"/>
                    <path d="M8 8h8a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z" fill="none" stroke="white" stroke-width="1.5"/>
                    <path d="M17 10l2-1v6l-2-1" fill="white"/>
                    <circle cx="10" cy="11" r="0.5" fill="white"/>
                </svg>
            </button>
            <button class="nav-btn" data-filter="recent" aria-label="Recently Watched">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="#FFD700"/>
                    <path d="M12 6v6l3 3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="nav-btn" data-filter="downloads" aria-label="Downloads">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="#4CAF50"/>
                    <path d="M12 6v8M8 11l4 4 4-4" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7 16h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="nav-btn settings-btn" aria-label="Settings">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="#607D8B"/>
                    <circle cx="12" cy="12" r="3" fill="white"/>
                    <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </nav>

        <!-- Content Grid -->
        <main class="content-grid" id="content-grid">
            <!-- Items will be dynamically inserted here -->
        </main>

        <!-- Loading Indicator -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Player Screen -->
    <div id="player-screen" class="screen hidden">
        <video id="video-player" playsinline></video>
        
        <!-- Buffering Indicator -->
        <div id="buffering-indicator" class="buffering-indicator hidden">
            <div class="buffering-spinner"></div>
        </div>
        
        <!-- Simple Play/Pause overlay -->
        <div id="player-overlay" class="player-overlay">
            <button id="play-pause-btn" class="play-pause-btn" aria-label="Play/Pause">
                <svg viewBox="0 0 24 24" class="play-icon">
                    <polygon points="5,3 19,12 5,21" fill="white"/>
                </svg>
                <svg viewBox="0 0 24 24" class="pause-icon hidden">
                    <rect x="6" y="4" width="4" height="16" rx="1" fill="white"/>
                    <rect x="14" y="4" width="4" height="16" rx="1" fill="white"/>
                </svg>
            </button>
            <!-- Restart from beginning button (shown when paused on long video) -->
            <button id="restart-btn" class="restart-btn hidden" aria-label="Restart from beginning">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.5)"/>
                    <path d="M12 6v6l4 2" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <path d="M7 9l-3-3 3-3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 6h8a6 6 0 1 1 0 12h-1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <!-- Back Button -->
        <button id="back-btn" class="back-btn" aria-label="Go Back">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.5)"/>
                <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Swipe-up Drawer -->
        <div id="related-drawer" class="related-drawer">
            <div class="drawer-handle"></div>
            <div class="drawer-content" id="drawer-content">
                <!-- Related videos will be inserted here -->
            </div>
        </div>

        <!-- Swipe hint indicator -->
        <div id="swipe-hint" class="swipe-hint">
            <div class="swipe-arrow"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <!-- Clear Downloads Button (trash icon) -->
            <button id="clear-downloads-btn" class="settings-action-btn">
                <svg viewBox="0 0 24 24" width="64" height="64">
                    <circle cx="12" cy="12" r="11" fill="#FF9800"/>
                    <path d="M9 9v7M12 9v7M15 9v7M7 7h10M9 7V5h6v2" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <!-- Logout Button (X icon) -->
            <button id="logout-btn" class="settings-action-btn">
                <svg viewBox="0 0 24 24" width="64" height="64">
                    <circle cx="12" cy="12" r="11" fill="#f44336"/>
                    <path d="M9 9l6 6M15 9l-6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <!-- Close Button -->
            <button id="close-settings" class="close-modal-btn">
                <svg viewBox="0 0 24 24" width="48" height="48">
                    <circle cx="12" cy="12" r="10" fill="#607D8B"/>
                    <path d="M7 12h10M12 7l5 5-5 5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal (math question) -->
    <div id="delete-confirm-modal" class="modal hidden">
        <div class="modal-content delete-confirm-content">
            <div class="math-question">
                <span id="math-num1" class="math-num">3</span>
                <span class="math-op">+</span>
                <span id="math-num2" class="math-num">2</span>
                <span class="math-eq">=</span>
                <span class="math-op">?</span>
            </div>
            <div class="math-answers" id="math-answers">
                <!-- Answer buttons generated by JS -->
            </div>
            <button id="cancel-delete-btn" class="cancel-delete-btn">
                <svg viewBox="0 0 24 24" width="48" height="48">
                    <circle cx="12" cy="12" r="10" fill="#607D8B"/>
                    <path d="M15 9l-6 6M9 9l6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="js/jellyfin-api.js"></script>
    <script src="js/download-manager.js"></script>
    <script src="js/fullscreen.js"></script>
    <script src="js/app.js"></script>
    <script src="js/tv-navigation.js"></script>
    <script>
        // Register Service Worker for PWA/offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration.scope);
                        
                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // New version available
                                    console.log('New version available');
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
